name: Inspect Summer Girl Rig

on:
  push:
    branches:
      - master
    paths:
      - inspect_model.py
      - .github/workflows/inspect_summer_girl.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download source model
        run: |
          rm -rf model model.zip
          mkdir -p model
          curl --fail --location --retry 5 --retry-delay 3 \
            --output model.zip \
            https://mirror.traines.eu/sketchfab-backup/61/619cfd5b08ca46589ed3ad9f6154179f.zip
          unzip -q model.zip -d model

      - name: Install Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender
          blender --version

      - name: Inspect model
        run: |
          blender --background --python inspect_model.py
          cat report.txt

      - name: Save inspection report
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          printf 'run_id=%s\ncommit=%s\n' "$RUN_ID" "$GITHUB_SHA" > inspection_status.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add report.txt inspection_status.txt
          git commit -m "Save Summer Girl rig inspection" || exit 0
          git push
